# Post-Production Profili

project_root: ".."
book_slug: "github_kitabi"
chapters_dir: "chapters"
output_dir: "dist"
assets_dir: "assets"
build_dir: "build"

chapters:
  - id: chapter_01
    source: "chapters/chapter_01.md"
  - id: chapter_02
    source: "chapters/chapter_02.md"
  - id: chapter_03
    source: "chapters/chapter_03.md"
  - id: chapter_04
    source: "chapters/chapter_04.md"
  - id: chapter_05
    source: "chapters/chapter_05.md"
  - id: chapter_06
    source: "chapters/chapter_06.md"
  - id: chapter_07
    source: "chapters/chapter_07.md"
  - id: chapter_08
    source: "chapters/chapter_08.md"

pandoc:
  reference_docx: ""
  lua_filter: ""

mermaid:
  enabled: true
  output_dir: "assets/auto/diagrams"

stages:
  - validate
  - merge
  - prepare-mermaid
  - render_mermaid
  - generate-qr
  - resolve-assets
  - inject-qr
  - build_docx
  - build_html
  - build_epub
  - generate-web-site
