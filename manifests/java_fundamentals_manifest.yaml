book:
  book_id: java_fundamentals
  title:
    tr: Java'nın Temelleri
    en: Java Fundamentals
    de: Grundlagen von Java
  subtitle:
    tr: Bilgisayar Mühendisliği Öğrencileri İçin Temel Programlama, Konsol ve GUI Uygulamaları
    en: Fundamental Programming, Console and GUI Applications for Computer Engineering Students
    de: Grundlegende Programmierung, Konsolen- und GUI-Anwendungen für Informatikstudierende
  author: İsmail Kırbaş
  year: '2026'
  version: 1.0-v2.4.1-manifest
  book_type: applied_textbook
  domain: programming
  primary_technology: Java
  target_output_formats:
  - markdown
  - docx
  - pdf
language:
  primary_language: tr
  output_languages:
  - tr
  - en
  - de
  generation_mode: parallel
  file_naming_language: en
  manifest_language: en
  automation_language: en
  content_language_policy:
    headings: target_language
    body_text: target_language
    exercises: target_language
    glossary: target_language_with_english_terms
    code_comments: target_language
    code_identifiers: en
    console_outputs: target_language
  terminology:
    use_controlled_glossary: true
    glossary_file: terminology_glossary.yaml
    first_use_policy: target_term_with_english_in_parentheses
  fallback:
    fallback_language: tr
    missing_translation_policy: report_missing_do_not_invent
audience:
  primary:
    tr:
    - Bilgisayar mühendisliği lisans öğrencileri
    - Yazılım mühendisliği lisans öğrencileri
    en:
    - Undergraduate computer engineering students
    - Undergraduate software engineering students
    de:
    - Informatikstudierende im Grundstudium
    - Studierende der Softwaretechnik
  assumed_background:
    tr:
    - Temel bilgisayar okuryazarlığı
    - Dosya ve klasör mantığı
    en:
    - Basic computer literacy
    - Basic understanding of files and folders
    de:
    - Grundlegende Computerkenntnisse
    - Grundverständnis von Dateien und Ordnern
  not_assumed:
    tr:
    - Önceden Java bilgisi
    - Nesneye yönelik programlama ayrıntıları
    en:
    - Prior Java knowledge
    - Detailed object-oriented programming knowledge
    de:
    - Vorkenntnisse in Java
    - Detaillierte Kenntnisse der objektorientierten Programmierung
pedagogy:
  approach:
  - simplicity
  - practice_oriented
  - concrete_to_abstract
  - error_based_learning
  - lab_friendly
  default_chapter_flow:
  - chapter_roadmap
  - pedagogical_role
  - learning_outcomes
  - prerequisites
  - core_concepts
  - step_by_step_examples
  - working_logic
  - mini_application
  - common_mistakes
  - debugging_task
  - summary
  - glossary
  - self_assessment
  - programming_exercises
  - lab_task
  - rubric
  - further_reading
  - bridge_to_next_chapter
technical_profile:
  code_language: java
  code_block_language_tag: java
  file_extension: .java
  identifier_language: en
  main_file_rule: public class name must match the file name
  package_policy: No package declaration in beginner chapters unless explicitly required
  runtime:
    name: JDK
    min_version: '17'
    preferred_version: '21'
  code_execution_policy:
    compile_check: true
    run_check: optional
    broken_examples_marked: true
content_scope:
  include:
  - Java SE
  - JVM, JRE, JDK
  - console applications
  - variables
  - operators
  - decision structures
  - loops
  - methods
  - arrays
  - collections
  - Swing GUI
  - basic JDBC
  exclude:
  - Spring Boot
  - Hibernate
  - advanced design patterns
  - enterprise microservice architecture
  - advanced concurrency
sources:
  priority_policy:
  - official_documentation
  - official_learning_resources
  - language_specification
  - trusted_textbooks
  - academic_pedagogy_sources
  required_sources:
  - title: Java SE Documentation
    type: official_documentation
    language: en
    usage: API and platform behavior verification
  - title: Dev.java
    type: official_learning_resource
    language: en
    usage: Modern Java learning guidance
  - title: Java Language Specification
    type: language_specification
    language: en
    usage: Syntax and language rules
capabilities:
  code_examples: true
  runnable_projects: true
  mermaid_diagrams: true
  screenshots: false
  qr_codes: true
  github_export: true
  docx_build: true
  multilingual_output: true
assessment:
  include_multiple_choice: true
  include_true_false: true
  include_open_ended: true
  include_debugging_tasks: true
  include_lab_rubric: true
  question_language: target_language
  difficulty_distribution:
    easy: 30
    medium: 50
    hard: 20
automation:
  numbering_policy: build_time
  chapter_id_policy: stable_slug
  heading_numbering: false
  figure_numbering: build_time
  table_numbering: build_time
  code_numbering: build_time
  github_policy: chapter_id_based_paths
  github_code_path_template: code/{chapter_id}/code{code_index}/{file}
  qr_policy: manifest_based
  manual_asset_override: true
  output_root: generated/java_fundamentals
assets:
  mermaid:
    enabled: true
    meta_required: true
    output_format: png
    default_width_cm: 12.5
  screenshots:
    enabled: false
    meta_required: true
  manual_override:
    enabled: true
    manual_dir: assets/manual
    auto_dir: assets/auto
    locked_dir: assets/locked
    final_dir: assets/final
  localization_policy: language_specific_when_textual
approval_gates:
  manifest_validation:
    required: true
    actor: human_or_llm
    stop_on_failure: true
  prompt_package_generation:
    required: false
    actor: llm
  chapter_input_generation:
    required: false
    actor: llm
  outline_generation:
    required: true
    actor: llm
  outline_review:
    required: true
    actor: human_or_llm
    allowed_decisions:
    - PASS
    - REVISION_REQUIRED
    - BLOCKED
    stop_on_blocked: true
  full_text_generation:
    required: true
    actor: human
    requires_previous_gate: outline_review:PASS
  final_build:
    required: false
    actor: human
audit:
  save_generation_log: true
  save_prompt_snapshots: true
  save_manifest_hash: true
  save_model_notes: true
rights:
  source_use_policy: summarize_transform_and_attribute
  code_license: MIT
  book_license: all_rights_reserved
  image_policy: generated_user_provided_or_licensed
  attribution_required: true
