book:
  id: "react_web_uygulamalari"
  title: "React ile Web Uygulama Geliştirme"
  subtitle: "KampüsHub Projesi Üzerinden Modern Front-End Uygulama Geliştirme"
  author: "Prof. Dr. İsmail KIRBAŞ"
  language: "tr-TR"
  publisher: "Mehmet Akif Ersoy Üniversitesi"
  version: "0.1.0"
  year: "2026"

pedagogy:
  target_audience:
    - "Bilgisayar mühendisliği lisans öğrencileri"
    - "Yazılım mühendisliği lisans öğrencileri"
    - "HTML ve CSS bilen React başlangıç öğrencileri"
  prerequisite:
    - "HTML"
    - "CSS"
    - "Temel web okuryazarlığı"
  main_project:
    name: "KampüsHub"
    description: "Ders duyuruları, etkinlik takvimi, not paylaşımı ve kullanıcı profili modüllerini içeren kümülatif React web uygulaması."

scope:
  primary_stack:
    - "React"
    - "Vite"
    - "React Router"
    - "Redux Toolkit"
    - "Zustand"
    - "TanStack Query"
    - "React Hook Form"
    - "Vitest"
    - "React Testing Library"

