code_policy:
  default_language: "javascript"
  supported_languages:
    - "javascript"
    - "jsx"
    - "css"
    - "json"
    - "bash"
  code_meta_required: true
  executable_examples: true

screenshot_policy:
  enabled: true
  marker_format: "[SCREENSHOT:bXX_YY_aciklayici_ad]"
  route_prefix: "/__book__/"
  minimum_per_chapter: 1
  visual_chapters_minimum: 2
  visual_chapters_maximum: 4
