profile:
  id: "react_web_uygulamalari_profile"
  name: "React ile Web Uygulama Geliştirme"
  version: "0.1.0"

paths:
  root: "workspace/react"
  manifest: "workspace/react/book_manifest.yaml"
  chapters_dir: "workspace/react/chapters"
  build_dir: "workspace/react/build"
  export_dir: "workspace/react/exports"
  assets_dir: "workspace/react/assets"

code:
  extract: true
  chapters_dir: "workspace/react/chapters"
  out_dir: "workspace/react/build/code"
  manifest_json: "workspace/react/build/code_manifest.json"
  manifest_yaml: "workspace/react/build/code_manifest.yaml"
  test_report_json: "workspace/react/build/test_reports/code_test_report.json"
  test_report_md: "workspace/react/build/test_reports/code_test_report.md"
  default_timeout_sec: 15
  node: "node"

mermaid:
  enabled: true
  output_dir: "workspace/react/assets/images/mermaid"
  background: "white"
  puppeteer_config: "configs/puppeteer_config.json"

screenshots:
  enabled: true
  manifest: "workspace/react/build/screenshot_manifest.json"
  output_dir: "workspace/react/assets/screenshots"
  route_prefix: "/__book__/"

export:
  formats:
    - "markdown"
    - "html"
    - "epub"
  markdown_output: "workspace/react/exports/react_web_uygulamalari.md"
  html_output: "workspace/react/exports/react_web_uygulamalari.html"
  epub_output: "workspace/react/exports/react_web_uygulamalari.epub"

dashboard:
  enabled: true
  port: 8501
