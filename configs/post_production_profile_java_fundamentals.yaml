post_production:
  build:
    merged_markdown: build/java_fundamentals/tr/java_fundamentals_merged.md
    output_docx: dist/java_fundamentals_tr.docx
    report: build/reports/post_production_report.md
  mermaid:
    enabled: true
    output_dir: build/java_fundamentals/tr/mermaid_images
    background: white
    puppeteer_config: configs/puppeteer_config.json
    pdf_fit: true
    docx_width: 4.90in
  assets:
    manual_override: true
    auto_dir: assets/auto
    manual_dir: assets/manual
    locked_dir: assets/locked
    final_dir: assets/final
  qr:
    enabled: true
    manifest: build/java_fundamentals/tr/qr_manifest.yaml
    output_dir: assets/auto/qr
    report: build/reports/qr_generation_report.md
    allow_missing_manifest: true
    code_source_qr: language_independent
    code_page_qr: language_specific
  pandoc:
    from: markdown+tex_math_single_backslash
    reference_docx: templates/reference_docs/referenceV17_java_temelleri.docx
    lua_filter: templates/lua_filters/styles_revised_v17.lua
    toc: true
    toc_depth: 2
    metadata:
      toc-title: İçindekiler
  docx_postprocess:
    enabled: true
    format_fix_tool: fix_docx_format_ooxml.py
    fix_table_headers: true
    center_images: true
    center_h1: true
    center_end_markers: true
    justify_pedagogic_boxes: true
    optimize_tables: true
    table_mode: proportional
    backup_before_in_place: true
  quality_gates:
    stop_on_missing_chapter: true
    stop_on_missing_reference_docx: true
    stop_on_missing_lua_filter: true
    stop_on_mermaid_render_error: true
    stop_on_pandoc_error: true

# v2.5.0 optional code validation profile
code_validation:
  enabled: true
  execution_mode: "local_or_docker"
  chapters_dir: "generated/java_fundamentals/tr/chapters"
  out_dir: "build/java_fundamentals/code"
  manifest_json: "build/java_fundamentals/code_manifest.json"
  manifest_yaml: "build/java_fundamentals/code_manifest.yaml"
  report_json: "build/java_fundamentals/test_reports/code_test_report.json"
  report_md: "build/java_fundamentals/test_reports/code_test_report.md"
  repair_prompts_dir: "build/java_fundamentals/repair_prompts"
  timeout_sec: 10
  fail_on_error: true
